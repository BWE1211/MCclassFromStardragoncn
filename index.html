<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #fafafe;
      color: #222;
      margin: 0;
      padding: 0;
    }
    h1 {
      background: #3f51b5;
      color: #fff;
      padding: 1rem;
      margin: 0;
    }
    .container {
      max-width: 700px;
      margin: 2rem auto;
      background: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.03);
      border-radius: 8px;
      padding: 2rem;
    }
    ul {
      line-height: 2;
      padding-left: 1.2rem;
    }
    li {
      margin-bottom: .4rem;
    }
    a {
      color: #3f51b5;
      text-decoration: none;
      transition: color .2s;
    }
    a:hover {
      color: #e91e63;
      text-decoration: underline;
    }
    h2 {
      margin-top: 2rem;
      color: #3f51b5;
    }
    .tip {
      font-size: .95rem;
      color: #888;
      margin-top: 2rem;
    }
</style>
<title>我的个人网站</title>
<meta charset="utf-8">
</head>
<body>
    <h1>欢迎来到我的网站！</h1>
    <p>这是我的GitHub Pages个人网站</p>
</body>
</html>
